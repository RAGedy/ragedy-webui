# Standalone dev compose for ragedy-webui.
# Backend services (db, litellm, rag-agent) are managed by RAGedy_Ann.
# Start RAGedy_Ann services first, then run this for the frontend only.

services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    profiles:
      - ollama

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL='
      - 'OPENAI_API_BASE_URL=http://host.docker.internal:4005/v1'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'WEBUI_SECRET_KEY='
      - 'WEBUI_NAME=${WEBUI_NAME:-RAGedy Ann}'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
